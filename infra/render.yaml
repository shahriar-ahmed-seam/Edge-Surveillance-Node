# Render Blueprint for the Edge-Surveillance-Node backend.
# Deploys the FastAPI service (REST + WebSocket + MQTT ingestion) and a managed
# PostgreSQL database. The ingestion worker runs inside the web service via the
# FastAPI lifespan, so a single service covers API + ingestion.
#
# Provision an MQTT broker separately (managed EMQX / HiveMQ Cloud, with TLS +
# auth) and set MQTT_* env vars accordingly. Object storage uses an external
# S3-compatible bucket (set S3_* env vars).

services:
  - type: web
    name: esn-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: esn-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_LIFETIME_HOURS
        value: "12"
      - key: MQTT_HOST
        sync: false
      - key: MQTT_PORT
        value: "8883"
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_USE_TLS
        value: "true"
      - key: STORAGE_BACKEND
        value: "s3"
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_REGION
        value: "us-east-1"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: "INFO"

databases:
  - name: esn-postgres
    plan: basic-256mb
    databaseName: edge
    user: edge
