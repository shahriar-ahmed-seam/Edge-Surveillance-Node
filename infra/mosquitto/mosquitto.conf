# Mosquitto broker config for Edge-Surveillance-Node (local dev).
#
# Anonymous access is DISABLED: failed/absent credentials are rejected and the
# broker never accepts unauthenticated connections (Requirement 9.2, Property 10).
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# In production, terminate TLS on port 8883:
#   listener 8883
#   cafile   /mosquitto/certs/ca.crt
#   certfile /mosquitto/certs/server.crt
#   keyfile  /mosquitto/certs/server.key
#   require_certificate false

persistence true
persistence_location /mosquitto/data/
log_dest stdout
