name: edge-surveillance-node

services:
  broker:
    image: eclipse-mosquitto:2
    container_name: esn-broker
    ports:
      - "1883:1883" # plaintext (local dev only; TLS port 8883 in prod)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: esn-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: esn-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: esn-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/edge
      JWT_SECRET: local-dev-secret-change-me
      JWT_LIFETIME_HOURS: "12"
      MQTT_HOST: broker
      MQTT_PORT: "1883"
      MQTT_USERNAME: ingestion
      MQTT_PASSWORD: ingestion-secret
      MQTT_USE_TLS: "false"
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: snapshots
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      CORS_ALLOW_ORIGINS: http://localhost:3000
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
